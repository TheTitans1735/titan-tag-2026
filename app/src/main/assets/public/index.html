<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff69b4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TITANTAG - מערכת ארכיאולוגיה</title>
    
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 1rem;
            background: linear-gradient(135deg, #ff69b4, #ffb6c1);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: #d1477a;
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        label {
            font-weight: bold;
            color: #d1477a;
        }
        input, select {
            padding: 0.75rem;
            border: 2px solid #ffb6c1;
            border-radius: 8px;
            font-size: 1rem;
        }
        button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #d1477a;
        }
        .hidden {
            display: none;
        }
        .main-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        .menu-button {
            background: #ffb6c1;
            padding: 1.5rem;
            text-align: center;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            color: #333;
        }
        .menu-button:hover {
            background: #ff69b4;
            color: white;
        }
    </style>
</head>
<body>

    <script>
        let currentUser = null;
        
        function login() {
            try {
                console.log('Login function started');
                const name = document.getElementById('userName').value;
                const email = document.getElementById('userEmail').value;
                const role = document.getElementById('userRole').value;
                const site = document.getElementById('userSite').value;
                
                console.log('Form values:', { name, email, role, site });
                
                if (!name || !email || !role || !site) {
                    alert('נא למלא את כל השדות');
                    return;
                }
                
                currentUser = { name, email, role, site };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                console.log('About to show main menu');
                showMainMenu();
                console.log('About to update user info');
                updateUserInfo();
                console.log('Login completed successfully');
            } catch (error) {
                console.error('Login error:', error);
                alert('שגיאה בהתחברות: ' + error.message);
            }
        }
        
        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainScreen').classList.add('hidden');
        }
        
        function updateWelcomeTitle() {
            if (currentUser && currentUser.name) {
                document.querySelector('h1').textContent = `שלום ${currentUser.name}`;
            }
        }
        
        function showMainMenu() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
            document.getElementById('addFindScreen').classList.add('hidden');
            document.getElementById('findListScreen').classList.add('hidden');
            document.getElementById('editFindScreen').classList.add('hidden');
            updateWelcomeTitle();
        }
        
        function showAddFind() {
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('addFindScreen').classList.remove('hidden');
            document.getElementById('findListScreen').classList.add('hidden');
            document.getElementById('editFindScreen').classList.add('hidden');
            
            // Reset all fields
            document.getElementById('findPlot').value = '';
            document.getElementById('findLayer').value = '';
            document.getElementById('findDescription').value = '';
            getCurrentLocation();
            capturedImages = [];
            document.getElementById('imageThumbnails').innerHTML = '';
            updateWelcomeTitle();
        }
        
        
        function showScanQR() {
            // Check HTTPS
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                alert('סריקת QR דורשת חיבור HTTPS. אנא השתמש בכתובת HTTPS.');
                return;
            }
            
            
            if (typeof Html5QrcodeScanner === 'undefined') {
                alert('ספריית סריקת QR לא נטענה כראוי. אנא רענן את הדף.');
                return;
            }
            
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('הדפדפן שלך לא תומך בגישה למצלמה.');
                return;
            }
            
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('findListScreen').classList.add('hidden');
            updateWelcomeTitle();
            startQRScanner();
        }
        
        
        let html5QrcodeScanner = null;
        function startQRScanner() {
            try {
                
                const scannerDiv = document.createElement('div');
                scannerDiv.id = 'qr-reader';
                scannerDiv.style.position = 'fixed';
                scannerDiv.style.top = '0';
                scannerDiv.style.left = '0';
                scannerDiv.style.width = '100%';
                scannerDiv.style.height = '100%';
                scannerDiv.style.backgroundColor = 'white';
                scannerDiv.style.zIndex = '1000';
                scannerDiv.style.direction = 'ltr'; 
                document.body.appendChild(scannerDiv);
                
                
                const closeButton = document.createElement('button');
                closeButton.textContent = '✕ סגור';
                closeButton.style.position = 'fixed';
                closeButton.style.top = '10px';
                closeButton.style.right = '10px';
                closeButton.style.zIndex = '1002';
                closeButton.style.padding = '10px 15px';
                closeButton.style.backgroundColor = '#ff69b4';
                closeButton.style.color = 'white';
                closeButton.style.border = 'none';
                closeButton.style.borderRadius = '5px';
                closeButton.style.cursor = 'pointer';
                closeButton.style.fontSize = '16px';
                closeButton.style.fontWeight = 'bold';
                closeButton.onclick = stopQRScanner;
                document.body.appendChild(closeButton);
                
                
                html5QrcodeScanner = new Html5QrcodeScanner(
                    "qr-reader", 
                    { 
                        fps: 10, 
                        qrbox: {width: 250, height: 250},
                        supportedScanTypes: [0] 
                    }
                );
                
                html5QrcodeScanner.render(onScanSuccess, onScanFailure);
                
            } catch (error) {
                console.error('שגיאה באתחול סורק QR:', error);
                alert('לא הצלחנו להפעיל את מצלמת הסריקה: ' + error.message);
                stopQRScanner();
            }
        }
        function onScanSuccess(decodedText, decodedResult) {
            console.log('קוד QR נסרק בהצלחה:', decodedText);
            stopQRScanner();
            
            
            if (decodedText.startsWith('FIND-')) {
                const findId = decodedText.replace('FIND-', '');
                showFindDetailsModal(findId);
            } else {
                showFindDetailsModal(decodedText);
            }
        }
        function onScanFailure(error) {
            
            
        }
        function stopQRScanner() {
            try {
                if (html5QrcodeScanner) {
                    html5QrcodeScanner.clear();
                    html5QrcodeScanner = null;
                }
            } catch (error) {
                console.error('שגיאה בסגירת סורק:', error);
            }
            
            
            const elements = ['qr-reader', 'button[onclick="stopQRScanner()"]'];
            elements.forEach(selector => {
                const elements = document.querySelectorAll(selector);
                elements.forEach(el => el.remove());
            });
        }
        function showFindDetailsModal(findId) {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.backgroundColor = 'rgba(0,0,0,0.5)';
            modal.style.zIndex = '1000';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            
            const content = document.createElement('div');
            content.style.backgroundColor = 'white';
            content.style.padding = '2rem';
            content.style.borderRadius = '15px';
            content.style.maxWidth = '500px';
            content.style.textAlign = 'right';
            content.innerHTML = `
                <h2>ממצא #${findId}</h2>
                <p>פרטי הממצא יוצגו כאן לאחר התחברות למסד הנתונים</p>
                <button onclick="this.parentElement.parentElement.remove()" style="background: #ff69b4; color: white; border: none; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer; margin-top: 1rem;">סגור</button>
            `;
            
            modal.appendChild(content);
            document.body.appendChild(modal);
        }
        
        function showFindList() {
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('addFindScreen').classList.add('hidden');
            document.getElementById('findListScreen').classList.remove('hidden');
            document.getElementById('editFindScreen').classList.add('hidden');
            updateWelcomeTitle();
            loadFindList();
        }
        
        function loadFindList() {
            
            if (!window.allFinds) {
                window.allFinds = [
                    
                    {
                        id: 'FIND-1',
                        site: 'מצדה',
                        plot: 'א',
                        layer: '2',
                        description: 'רסיסי חרס מתקופת בית שני',
                        location: '31.3167, 35.3667',

        function createQRCode(text) {
            
            const canvas = document.createElement('canvas');
            const size = 180;
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, size, size);
            
            
            ctx.fillStyle = 'black';
            const cellSize = 4;
            const pattern = generateQRPattern(text);
            
            for (let row = 0; row < pattern.length; row++) {
                for (let col = 0; col < pattern[row].length; col++) {
                    if (pattern[row][col]) {
                        ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
                    }
                }
            }
            
            
            ctx.fillStyle = '#ff69b4';
            ctx.fillRect(size/2 - 8, size/2 - 8, 16, 16);
            ctx.fillStyle = 'white';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(text.substring(0, 8), size/2, size/2 + 3);
            
            return canvas;
        }
        
        function generateQRPattern(text) {
            
            const rows = 45;
            const cols = 45;
            const pattern = [];
            let hash = 0;
            
            for (let i = 0; i < text.length; i++) {
                const char = text.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            
            const random = () => {
                hash = (hash * 9301 + 49297) % 233280;
                return hash / 233280;
            };
            
            for (let row = 0; row < rows; row++) {
                pattern[row] = [];
                for (let col = 0; col < cols; col++) {
                    pattern[row][col] = random() > 0.5;
                }
            }
            
            return pattern;
        }
