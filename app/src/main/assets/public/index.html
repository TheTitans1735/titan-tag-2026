    <script>
        let currentUser = null;
        
        function login() {
            console.log('=== LOGIN FUNCTION CALLED ===');
            try {
                console.log('Login function started');
                
                const nameInput = document.getElementById('userName');
                const emailInput = document.getElementById('userEmail');
                const roleInput = document.getElementById('userRole');
                const siteInput = document.getElementById('userSite');
                
                console.log('Input elements found:', {
                    name: !!nameInput,
                    email: !!emailInput, 
                    role: !!roleInput,
                    site: !!siteInput
                });
                
                const name = nameInput ? nameInput.value : '';
                const email = emailInput ? emailInput.value : '';
                const role = roleInput ? roleInput.value : '';
                const site = siteInput ? siteInput.value : '';
                
                console.log('Form values:', { name, email, role, site });
                
                if (!name || !email || !role || !site) {
                    console.log('Validation failed - missing fields');
                    alert('נא למלא את כל השדות');
                    return;
                }
                
                // בדיקת תקינות אימייל בסיסית
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    console.log('Email validation failed');
                    alert('נא להכניס כתובת אימייל תקינה');
                    return;
                }
                
                currentUser = { name, email, role, site };
                console.log('Current user set:', currentUser);
                
                // שמירה ב-localStorage עם טיפול בשגיאות
                try {
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    console.log('User saved to localStorage successfully');
                } catch (storageError) {
                    console.error('Error saving to localStorage:', storageError);
                    alert('שגיאה בשמירת נתוני המשתמש. אנא נסה שוב.');
                    return;
                }
                
                console.log('About to show main menu');
                try {
                    showMainMenu();
                    console.log('showMainMenu executed successfully');
                } catch (e) {
                    console.error('Error in showMainMenu:', e);
                    alert('שגיאה במעבר לתפריט הראשי: ' + e.message);
                    return;
                }
                
                console.log('About to update user info');
                try {
                    updateUserInfo();
                    console.log('updateUserInfo executed successfully');
                } catch (e) {
                    console.error('Error in updateUserInfo:', e);
                }
                
                console.log('=== LOGIN COMPLETED SUCCESSFULLY ===');
            } catch (error) {
                console.error('=== LOGIN ERROR ===', error);
                alert('שגיאה בהתחברות: ' + error.message);
            }
        }
        
        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainScreen').classList.add('hidden');
        }
        
        function updateWelcomeTitle() {
            if (currentUser && currentUser.name) {
                document.querySelector('h1').textContent = `שלום ${currentUser.name}`;
            }
        }
        
        function showMainMenu() {
            try {
                console.log('Showing main menu');
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainScreen').classList.remove('hidden');
                document.getElementById('addFindScreen').classList.add('hidden');
                document.getElementById('findListScreen').classList.add('hidden');
                document.getElementById('editFindScreen').classList.add('hidden');
                updateWelcomeTitle();
                updateUserInfo();
                console.log('Main menu shown successfully');
            } catch (error) {
                console.error('Error showing main menu:', error);
                alert('שגיאה בהצגת התפריט הראשי');
            }
        }
        
        function showAddFind() {
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('addFindScreen').classList.remove('hidden');
            document.getElementById('findListScreen').classList.add('hidden');
            document.getElementById('editFindScreen').classList.add('hidden');
            
            // Reset all fields
            document.getElementById('findPlot').value = '';
            document.getElementById('findLayer').value = '';
            document.getElementById('findDescription').value = '';
            getCurrentLocation();
            capturedImages = [];
            document.getElementById('imageThumbnails').innerHTML = '';
            updateWelcomeTitle();
        }
        
        
        function showScanQR() {
            // Check HTTPS
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                alert('סריקת QR דורשת חיבור HTTPS. אנא השתמש בכתובת HTTPS.');
                return;
            }
            
            
            if (typeof Html5QrcodeScanner === 'undefined') {
                alert('ספריית סריקת QR לא נטענה כראוי. אנא רענן את הדף.');
                return;
            }
            
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('הדפדפן שלך לא תומך בגישה למצלמה.');
                return;
            }
            
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('findListScreen').classList.add('hidden');
            updateWelcomeTitle();
            startQRScanner();
        }
        
        
        let html5QrcodeScanner = null;
        function startQRScanner() {
            try {
                
                const scannerDiv = document.createElement('div');
                scannerDiv.id = 'qr-reader';
                scannerDiv.style.position = 'fixed';

        function createQRCode(text) {
            try {
                // Create a div element for QR code
                const qrDiv = document.createElement('div');
                qrDiv.style.width = '180px';
                qrDiv.style.height = '180px';
                qrDiv.style.display = 'flex';
                qrDiv.style.alignItems = 'center';
                qrDiv.style.justifyContent = 'center';
                qrDiv.style.backgroundColor = 'white';
                
                // Generate QR code using QRCode.js library
                if (typeof QRCode !== 'undefined') {
                    new QRCode(qrDiv, {
                        text: text,
                        width: 180,
                        height: 180,
                        colorDark: '#000000',
                        colorLight: '#FFFFFF',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                    
                    // Convert to canvas after a short delay to ensure rendering
                    setTimeout(() => {
                        return convertDivToCanvas(qrDiv);
                    }, 100);
                    
                    return qrDiv;
                } else {
                    console.error('QRCode library not loaded');
                    return createFallbackQRCode(text);
                }
            } catch (error) {
                console.error('Error creating QR code:', error);
                // Fallback to simple pattern
                return createFallbackQRCode(text);
            }
        }
        
        function convertDivToCanvas(div) {
            try {
                // Create canvas from div content
                const canvas = document.createElement('canvas');
                const size = 180;
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                
                // White background
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, size, size);
                
                // Find the QR image inside the div
                const img = div.querySelector('img');
                if (img && img.complete) {
                    ctx.drawImage(img, 0, 0, size, size);
                    return canvas;
                }
                
                return null;
            } catch (error) {
                console.error('Error converting div to canvas:', error);
                return null;
            }
        }
        
        function createFallbackQRCode(text) {
            const canvas = document.createElement('canvas');
            const size = 180;
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // White background
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, size, size);
            
            // Black border
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, size, 4);
            ctx.fillRect(0, 0, 4, size);
            ctx.fillRect(size - 4, 0, 4, size);
            ctx.fillRect(0, size - 4, size, 4);
            
            // Center text
            ctx.fillStyle = '#ff69b4';
            ctx.fillRect(size/2 - 30, size/2 - 15, 60, 30);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(text.substring(0, 10), size/2, size/2 + 4);
            
            return canvas;
        }

        // Voice Recognition System
        class VoiceRecognition {
            constructor() {
                this.recognition = null;
                this.isListening = false;
                this.micButton = document.getElementById('micButton');
                this.descriptionTextarea = document.getElementById('findDescription');
                this.statusMessage = document.getElementById('statusMessage');
                this.statusText = document.getElementById('statusText');
                this.speechDetected = false;
                this.timeoutId = null;
                this.lastSpeechTime = 0;
                this.lastInterimText = '';
                this.baseText = '';
                
                this.initializeSpeechRecognition();
            }
            
            initializeSpeechRecognition() {
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    this.showError('הדפדפן שלך לא תומך בזיהוי קולי. אנא השתמש בדפדפן מודרני.');
                    if (this.micButton) {
                        this.micButton.style.display = 'none';
                    }
                    return;
                }
                
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                this.recognition = new SpeechRecognition();
                
                // הגדרות לשפה העברית
                this.recognition.lang = 'he-IL';
                this.recognition.continuous = false;
                this.recognition.interimResults = true;
                this.recognition.maxAlternatives = 1;
                
                // אירועים
                this.recognition.onstart = () => {
                    this.startListening();
                };
                
                this.recognition.onresult = (event) => {
                    this.handleResult(event);
                };
                
                this.recognition.onerror = (event) => {
                    this.handleError(event);
                };
                
                this.recognition.onend = () => {
                    this.stopListening();
                };
            }
            
            startRecognition() {
                if (this.recognition) {
                    try {
                        this.recognition.start();
                    } catch (error) {
                        console.error('שגיאה בהפעלת זיהוי קולי:', error);
                    }
                }
            }
            
            startListening() {
                this.isListening = true;
                this.speechDetected = false;
                this.lastSpeechTime = Date.now();
                this.lastInterimText = '';
                this.baseText = this.descriptionTextarea ? this.descriptionTextarea.value : '';
                if (this.micButton) {
                    this.micButton.classList.add('listening');
                }
                this.showStatus('מאזין...', 'listening');

<!--                this.speak("הזן תיאור");-->

                // השמעת קובץ אודיו והמתנה לסיום לפני התחלת ההאזנה
                const audio = new Audio('enter_description.m4a');
                audio.play().catch(e => this.showVisualAlert(e));
                audio.onended = () => {
                    // לאחר סיום האודיו, מתחילים את טיימאאוט השקט
                    this.timeoutId = setTimeout(() => {
                        this.checkSilenceTimeout();
                    }, 5000);
                };
            }
            
            checkSilenceTimeout() {
                const timeSinceLastSpeech = Date.now() - this.lastSpeechTime;
                if (timeSinceLastSpeech >= 5000 && this.isListening) {
                    this.stopListening();
                    this.showError('לא זוהה דיבור. ההקלטה הופסקה.');
                } else if (this.isListening) {
                    // Reset timeout for another 5 seconds
                    this.timeoutId = setTimeout(() => {
                        this.checkSilenceTimeout();
                    }, 5000);
                }
            }
            
            stopListening() {
                this.isListening = false;
                if (this.micButton) {
                    this.micButton.classList.remove('listening');
                }
                this.hideStatus();
                
                // Clear the timeout
                if (this.timeoutId) {
                    clearTimeout(this.timeoutId);
                    this.timeoutId = null;
                }
                
                if (this.recognition) {
                    this.recognition.stop();
                }
            }
            
            handleResult(event) {
                let finalTranscript = '';
                let interimTranscript = '';
                
                // Mark that speech was detected and update last speech time
                if (event.results.length > 0) {
                    this.speechDetected = true;
                    this.lastSpeechTime = Date.now();
                }
                
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }
                
                // Real-time transcription without duplication
                if (this.descriptionTextarea) {
                    if (interimTranscript) {
                        // Store the interim text
                        this.lastInterimText = interimTranscript;
                        
                        // Show base text + interim text
                        const displayText = this.baseText + (this.baseText ? ' ' : '') + interimTranscript;
                        this.descriptionTextarea.value = displayText;
                        
                        // Move cursor to end
                        this.descriptionTextarea.focus();
                        this.descriptionTextarea.setSelectionRange(this.descriptionTextarea.value.length, this.descriptionTextarea.value.length);
                    }
                    
                    if (finalTranscript) {
                        // Add final transcript to base text
                        this.baseText = this.baseText + (this.baseText ? ' ' : '') + finalTranscript;
                        this.lastInterimText = '';
                        
                        // Update textarea with final text
                        this.descriptionTextarea.value = this.baseText;
                        this.descriptionTextarea.focus();
                        this.descriptionTextarea.setSelectionRange(this.descriptionTextarea.value.length, this.descriptionTextarea.value.length);
                    }
                }
                
                if (interimTranscript) {
                    this.showStatus(`מאזין: ${interimTranscript}`, 'listening');
                }
            }
            
            handleError(event) {
                let errorMessage = 'אירעה שגיאה בזיהוי קולי';
                
                switch (event.error) {
                    case 'no-speech':
                        errorMessage = 'לא זוהה דיבור. אנא נסה שוב.';
                        break;
                    case 'audio-capture':
                        errorMessage = 'לא ניתן לגשת למיקרופון. אנא בדוק הרשאות.';
                        break;
                    case 'not-allowed':
                        errorMessage = 'הגישה למיקרופון נדחתה. אנא אפשר גישה למיקרופון.';
                        break;
                    case 'network':
                        errorMessage = 'שגיאת רשת. אנא בדוק את החיבור לאינטרנט.';
                        break;
                }
                
                this.showError(errorMessage);
                this.stopListening();
            }
            
            showStatus(text, type) {
                if (this.statusText) {
                    this.statusText.textContent = text;
                }
                if (this.statusMessage) {
                    this.statusMessage.className = `status-message ${type}`;
                    this.statusMessage.style.display = 'flex';
                }
            }
            
            showError(text) {

                if (this.statusMessage) {
                    this.statusMessage.className = 'status-message error';
                    this.statusMessage.style.display = 'flex';

                setTimeout(() => {
                    this.hideStatus();
                }, 5000);
            }
            
            hideStatus() {
                if (this.statusMessage) {
                    this.statusMessage.style.display = 'none';
                }
            }

            tryWebSpeech(text) {

            enableAudioContext() {
                return new Promise((resolve, reject) => {
                    try {
                        // Method 1: Create new audio context
                        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                        const audioContext = new AudioContextClass();
                        
                        if (audioContext.state === 'suspended') {
                            audioContext.resume().then(() => {
                                console.log('Audio context resumed');

                    try {
                        // Create a silent audio element
                        const audio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=');
                        audio.volume = 0.01;
                        audio.play().then(() => {
                            console.log('Silent audio played successfully');
                            resolve();
                        }).catch(reject);
                        
                        // Clean up
                        setTimeout(() => {
                            audio.pause();
                        }, 100);
                    } catch (error) {
                        reject(error);
                    }
                });
            }
            
            createAndSpeakUtterance(text) {
                // Create utterance with better settings
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.7; // Slower for clarity
                utterance.pitch = 1.0;
                utterance.volume = 1.0;
                
                // Try to find a good voice
                const voices = speechSynthesis.getVoices();
                const englishVoice = voices.find(voice => 
                    voice.lang.startsWith('en') && voice.name.includes('Google')
                ) || voices.find(voice => voice.lang.startsWith('en')) || voices[0];
                
                if (englishVoice) {
                    utterance.voice = englishVoice;
                    console.log('Using voice:', englishVoice.name);
                }
                
                // Add event listeners
                utterance.onstart = () => {
                    console.log('Speaking:', text);
                };
                
                utterance.onend = () => {
                    console.log('Finished speaking:', text);
                };
                
                utterance.onerror = (event) => {
                    console.error('Speech synthesis error:', event);
                    this.showVisualAlert(text);
                };
                
                // Wait for voices to be loaded
                if (voices.length === 0) {
                    window.speechSynthesis.onvoiceschanged = () => {
                        this.speakWithRetry(utterance);
                    };
                } else {
                    this.speakWithRetry(utterance);
                }
            }
            
            speakWithRetry(utterance) {
                try {
                    setTimeout(() => {
                        speechSynthesis.speak(utterance);
                    }, 200);
                    
                    // Backup attempt
                    setTimeout(() => {
                        if (!speechSynthesis.speaking) {
                            speechSynthesis.speak(utterance);
                        }
                    }, 500);
                    
                    // Final backup
                    setTimeout(() => {
                        if (!speechSynthesis.speaking) {
                            this.showVisualAlert(utterance.text);
                        }
                    }, 1000);
                } catch (error) {
                    console.error('Speak retry failed:', error);
                    this.showVisualAlert(utterance.text);
                }
            }
            
            showVisualAlert(text) {
                // Show visual feedback instead of audio
                this.showStatus(text, 'listening');
                setTimeout(() => {
                    this.hideStatus();
                }, 3000);
                
                // Also show as browser notification if possible
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification('Voice Input', {
                        body: text,
                        icon: '🎤'
                    });
                } else if ('Notification' in window && Notification.permission !== 'denied') {
                    Notification.requestPermission().then(permission => {
                        if (permission === 'granted') {
                            new Notification('Voice Input', {
                                body: text,
                                icon: '🎤'
                            });
                        }
                    });
                }
            }
        }
        
        // Initialize voice recognition when page loads
        let voiceRecognition = null;
        
        function toggleVoiceRecognition() {
            if (!voiceRecognition) {
                voiceRecognition = new VoiceRecognition();
            }
            
            if (voiceRecognition.isListening) {
                voiceRecognition.stopListening();
            } else {
                voiceRecognition.startRecognition();
            }
        }
        
        // Initialize voice recognition on page load
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM Content Loaded - Starting initialization');
            
            // Debug: Check if buttons are clickable
            document.querySelectorAll('button').forEach((button, index) => {
                console.log(`Button ${index}: ${button.textContent} - onclick: ${button.onclick ? 'exists' : 'missing'}`);
                if (!button.onclick && button.getAttribute('onclick')) {
                    console.log(`Button ${index} has onclick attribute: ${button.getAttribute('onclick')}`);
                }
            });
            
            // Test click events
            document.addEventListener('click', function(event) {
                console.log('Click detected on:', event.target.tagName, event.target.textContent || event.target.value);
            }, true);
            
            // Request necessary permissions
            requestAppPermissions();
            
            // Wait for Android TTS interface to be ready
            setTimeout(() => {
                console.log('Initializing voice recognition...');
                voiceRecognition = new VoiceRecognition();
                
                // Test TTS availability with multiple attempts
                let attempts = 0;
                const maxAttempts = 5;
                
                function checkTTS() {
                    console.log(`TTS check attempt ${attempts + 1}/${maxAttempts}`);
                    console.log('window.AndroidTTS type:', typeof window.AndroidTTS);
                    console.log('window.AndroidTTS:', window.AndroidTTS);
                    console.log('window.Android type:', typeof window.Android);
                    console.log('window.Android:', window.Android);
                    
                    // Try multiple ways to access the interface
                    const ttsInterface = window.AndroidTTS || window.webkit.AndroidTTS || document.AndroidTTS;
                    
                    if (ttsInterface) {
                        console.log('Android TTS interface found');
                        console.log('TTS available:', ttsInterface.isAvailable());
                        console.log('TTS engine:', ttsInterface.getTTSEngine());
                        
                        if (ttsInterface.isAvailable()) {
                            console.log('TTS is ready for use');
                            // Store globally for easier access
                            window.AndroidTTS = ttsInterface;
                            return true;
                        }
                    } else {
                        console.log('Android TTS interface not found, falling back to web speech');
                        console.log('Available window properties:', Object.keys(window).filter(key => key.toLowerCase().includes('android')));
                        return false;
                    }
                }
                
                // Try multiple times
                const interval = setInterval(() => {
                    attempts++;
                    if (!checkTTS()) {
                        if (attempts >= maxAttempts) {
                            clearInterval(interval);
                            console.log('TTS interface not available after multiple attempts');
                        }
                    } else {
                        clearInterval(interval);
                    }
                }, 1000);
            }, 1000);
            
            console.log('DOM initialization completed');
        });
        
        // Request app permissions on startup
        function requestAppPermissions() {
            // Request microphone permission
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        console.log('Microphone permission granted');
                        stream.getTracks().forEach(track => track.stop()); // Stop immediately
                    })
                    .catch(error => {
                        console.warn('Microphone permission denied:', error);
                        showPermissionPrompt('microphone');
                    });
            }
            
            // Request notification permission
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission().then(permission => {
                    console.log('Notification permission:', permission);
                });
            }
            
            // Request audio context permissions for mobile
            if ('AudioContext' in window || 'webkitAudioContext' in window) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                const audioContext = new AudioContextClass();
                
                // Resume audio context if suspended (required by some mobile browsers)
                if (audioContext.state === 'suspended') {
                    audioContext.resume().then(() => {
                        console.log('Audio context resumed');
                    }).catch(error => {
                        console.warn('Failed to resume audio context:', error);
                    });
                }
            }
        }
        
        // Show permission prompt to user
        function showPermissionPrompt(type) {
            const message = type === 'microphone' 
                ? 'This app needs microphone access for voice input. Please enable microphone permissions in your browser settings.'
                : 'This app needs additional permissions to function properly.';
                
            alert(message);
        }
        
        // Add user interaction handler for audio context
        document.addEventListener('click', function initAudioOnFirstInteraction() {
            if ('AudioContext' in window || 'webkitAudioContext' in window) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                const audioContext = new AudioContextClass();
                
                if (audioContext.state === 'suspended') {
                    audioContext.resume().then(() => {
                        console.log('Audio context resumed by user interaction');
                    });
                }
            }
            
            // Remove listener after first interaction
            document.removeEventListener('click', initAudioOnFirstInteraction);
        }, { once: true });
    </script>
</body>
